# Hardened CodeQL scope for the parser repo.
# Keep alerts focused on first-party maintained code and workflow files.
disable-default-queries: false

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - .github
  - src
  - tests

paths-ignore:
  - MinerU/**
  - docs/**
  - deploy/**
  - examples/**
  - src/two_tier_document_parser.egg-info/**
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/.pytest_cache/**"
  - "**/.mypy_cache/**"
  - "**/*.ipynb"
